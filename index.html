<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE V31 - SOCCER STRIKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anta&family=Oswald:wght@500;700&display=swap');
        :root { --p: #00ff88; --gold: #ffd700; --bg: #020a05; --glass: rgba(10, 25, 15, 0.95); }
        * { box-sizing: border-box; font-family: 'Anta', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #0a2010 0%, #020a05 100%); }

        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 15px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(0,255,136,0.1); border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: center; }

        /* Sân bóng giả lập */
        .goal-area { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: 2px solid rgba(255,255,255,0.05); border-radius: 25px; position: relative; margin: 10px 0;
            background: linear-gradient(to bottom, rgba(0,255,136,0.05), transparent);
        }

        .striker-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 90%; }
        .slot { 
            aspect-ratio: 1/1.2; border: 2px dashed #222; border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; position: relative;
        }
        .slot.active { border: 2px solid var(--p); background: rgba(0,255,136,0.1); box-shadow: 0 0 20px var(--p); }
        .slot b { font-size: 1.5rem; font-family: 'Oswald'; }
        .slot span { font-size: 0.7rem; color: #555; }

        /* Ball Effect */
        #ball { width: 40px; position: absolute; bottom: 20px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 10px #fff); opacity: 0; }

        /* Controls */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { padding: 15px 5px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: #111; color: #555; font-size: 0.8rem; }
        .btn.pressed { background: var(--p); color: #000; box-shadow: 0 0 10px var(--p); }

        .prob-val { font-size: 2.5rem; font-family: 'Oswald'; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <div style="display:flex; justify-content: space-between; font-size: 0.7rem; color: var(--p);">
        <span>SERVER: MG-STRIKER-01</span>
        <span id="win-rate">ACCURACY: 98%</span>
    </div>

    <div class="glass-card" style="margin-top: 10px;">
        <small style="color:#555">XÁC SUẤT NỔ HŨ (JACKPOT)</small><br>
        <div class="prob-val" id="jp-prob">0%</div>
    </div>

    <div class="goal-area">
        <div class="striker-grid">
            <div class="slot" id="slot-0"><span>TRÁI</span><b id="pct-0">0%</b></div>
            <div class="slot" id="slot-1"><span>GIỮA</span><b id="pct-1">0%</b></div>
            <div class="slot" id="slot-2"><span>PHẢI</span><b id="pct-2">0%</b></div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" id="ball" alt="ball">
        <p id="advice" style="font-size: 0.8rem; color: #444; margin-top: 20px; letter-spacing: 2px;">VUI LÒNG NHẬP 3 VÁN GẦN NHẤT</p>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="pushData(0)">TRÁI</button>
        <button class="btn" onclick="pushData(1)">GIỮA</button>
        <button class="btn" onclick="pushData(2)">PHẢI</button>
    </div>

    <div style="text-align: center; margin-top: 15px; font-size: 0.6rem; color: #222;">
        SOCCER STRIKER AI ENGINE - V31.0 PLATINUM
    </div>
</div>

<script>
    let logs = [];

    function pushData(pos) {
        logs.push(pos);
        if(logs.length > 5) logs.shift();

        // Hiệu ứng nút bấm
        const btns = document.querySelectorAll('.btn');
        btns.forEach((b, i) => i === pos ? b.classList.add('pressed') : b.classList.remove('pressed'));

        // Giả lập quét dữ liệu
        document.getElementById('advice').innerText = "SCANNING GOALKEEPER MOVEMENT...";
        const ball = document.getElementById('ball');
        ball.style.opacity = "1";
        ball.style.left = "45%";
        ball.style.bottom = "20px";

        setTimeout(() => {
            // Tính toán tỉ lệ ảo
            const p1 = Math.floor(Math.random() * 40 + 10);
            const p2 = Math.floor(Math.random() * (90 - p1));
            const p3 = 100 - p1 - p2;
            const probs = [p1, p2, p3];
            
            const maxIdx = probs.indexOf(Math.max(...probs));
            
            // Cập nhật giao diện
            [0,1,2].forEach(i => {
                const s = document.getElementById('slot-'+i);
                document.getElementById('pct-'+i).innerText = probs[i] + "%";
                s.classList.remove('active');
                if(i === maxIdx) s.classList.add('active');
            });

            // Di chuyển bóng tới vị trí dự đoán
            ball.style.bottom = "120px";
            if(maxIdx === 0) ball.style.left = "15%";
            else if(maxIdx === 1) ball.style.left = "45%";
            else ball.style.left = "75%";

            // Tỉ lệ nổ hũ
            const jp = Math.floor(Math.random() * 20 + 75);
            document.getElementById('jp-prob').innerText = jp + "%";
            document.getElementById('advice').innerText = "VỊ TRÍ DỰ ĐOÁN: " + (maxIdx === 0 ? "TRÁI" : maxIdx === 1 ? "GIỮA" : "PHẢI");
            document.getElementById('advice').style.color = "var(--p)";

        }, 700);
    }
</script>
</body>
</html>
